services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opi-web
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-opi}
      DB_USER: ${DB_USER:-opi_user}
      DB_PASSWORD: ${DB_PASSWORD:-opi_secret}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.4
    container_name: opi-db
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${DB_NAME:-opi}
      MYSQL_USER: ${DB_USER:-opi_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-opi_secret}
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

volumes:
  db_data:
