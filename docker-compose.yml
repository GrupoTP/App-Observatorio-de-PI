services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opi-web
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./public/assets/uploads:/var/www/html/public/assets/uploads
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-opi}
      DB_USER: ${DB_USER:-opi_user}
      DB_PASSWORD: ${DB_PASSWORD:-opi_secret}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.4
    container_name: opi-db
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${DB_NAME:-opi}
      MYSQL_USER: ${DB_USER:-opi_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-opi_secret}
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/schema/00_charset.sql:/docker-entrypoint-initdb.d/00_charset.sql:ro
      - ./sql/schema/01_usuario.sql:/docker-entrypoint-initdb.d/01_usuario.sql:ro
      - ./sql/schema/02_curso_turma.sql:/docker-entrypoint-initdb.d/02_curso_turma.sql:ro
      - ./sql/schema/03_matricula_alocacao.sql:/docker-entrypoint-initdb.d/03_matricula_alocacao.sql:ro
      - ./sql/schema/04_projeto.sql:/docker-entrypoint-initdb.d/04_projeto.sql:ro
      - ./sql/schema/05_feedback_anexo.sql:/docker-entrypoint-initdb.d/05_feedback_anexo.sql:ro
      - ./sql/schema/06_relacionamentos_nn.sql:/docker-entrypoint-initdb.d/06_relacionamentos_nn.sql:ro
      - ./sql/schema/07_extensions.sql:/docker-entrypoint-initdb.d/07_extensions.sql:ro
      - ./sql/seeds/dev.sql:/docker-entrypoint-initdb.d/08_dev.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

volumes:
  db_data:
